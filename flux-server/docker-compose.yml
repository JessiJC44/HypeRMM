version: '3'

services:
  hbbs:
    container_name: flux-hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs -r flux.hyperemote.com:21117 -k _
    volumes:
      - ./data:/root
    network_mode: host
    depends_on:
      - hbbr
    restart: unless-stopped

  hbbr:
    container_name: flux-hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr -k _
    volumes:
      - ./data:/root
    network_mode: host
    restart: unless-stopped
